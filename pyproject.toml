[project]
name = "causal-uplift-experimentation-ops"
version = "0.1.0"
description = "Causal ML experimentation platform for uplift modeling and treatment policy simulation."
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "pandas",
    "scikit-learn",
    "scipy",
    "statsmodels",
    "matplotlib",
    "fastapi",
    "uvicorn",
    "streamlit",
    "pydantic",
    "pytest",
    "ruff",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
