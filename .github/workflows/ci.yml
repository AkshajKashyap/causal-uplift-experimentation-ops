name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: CLI smoke flow
        run: |
          generate-synthetic-experiment --rows 2000 --seed 42
          generate-ab-report
          generate-policy-artifact --artifact-version 1.0.0 --seed 42
          generate-api-staging-report
          generate-api-audit-smoke-log
          generate-staging-observability
